name: AI DE&S Daily Scraper

on:
  schedule:
    - cron: '0 19 * * *'
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Tests
        env:
          GROQ_API_KEY: "dummy_key_for_testing"
        run: |
          python -m pytest tests/

      - name: Run Scraper Pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python -m app.main --mode ${{ vars.TARGET_MODE || 'jobs' }} --urls "config/sites-vagas.txt"

      - name: Commit and Push Results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "Auto: Dados extraídos em $(date +'%Y-%m-%d')" || echo "Sem mudanças para commitar"
          git push